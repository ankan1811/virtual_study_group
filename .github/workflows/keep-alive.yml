name: Keep Render Alive

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 minutes
  workflow_dispatch:          # allow manual trigger from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.RENDER_BACKEND_URL }}/ping)
          echo "Response status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "⚠️ Ping returned $STATUS — server may be cold starting"
          else
            echo "✅ Server is alive"
          fi
